name: Daily Ingest

# Runs the SpecialSits ingestion cycle once a day.
# Step 1: authoritative (SEC/LSE/Nordic/StockAnalysis) — regulator-first, primary
# Step 2: legacy news ingest — keeps raw_items flowing so the auth pipeline can link news_items
#
# Setup (one-time):
# 1. GitHub repo → Settings → Secrets and variables → Actions → New repository secret
#    - Name:  INGEST_TOKEN
#    - Value: (your INGEST_TOKEN from Railway)
# 2. Commit this file. The workflow will run on the schedule below.
#
# You can also trigger it manually from the Actions tab → "Daily Ingest" → "Run workflow".

on:
  schedule:
    # 13:00 UTC daily = 09:00 ET (EDT) / 14:00 BST.
    # GitHub Actions schedules run in UTC and may be delayed by a few minutes under load.
    - cron: '0 13 * * *'
  workflow_dispatch:  # lets you run it manually from the Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger authoritative ingest
        env:
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          AUTH_URL: https://special-sits-production.up.railway.app/api/admin/run-auth-ingest
        run: |
          if [ -z "$INGEST_TOKEN" ]; then
            echo "::error::INGEST_TOKEN secret is not set."
            exit 1
          fi
          echo "Calling $AUTH_URL (regulator-first)"
          response=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "$AUTH_URL" \
            -H "x-ingest-token: $INGEST_TOKEN" \
            -H "content-type: application/json" \
            --data '{}' \
            --max-time 540)
          body=$(echo "$response" | sed -e 's/HTTP_STATUS:.*//g')
          status=$(echo "$response" | tr -d '\n' | sed -e 's/.*HTTP_STATUS://')
          echo "HTTP $status"
          echo "Response: $body"
          if [ "$status" -ne 200 ]; then
            echo "::error::Authoritative ingest failed with HTTP $status"
            exit 1
          fi
          echo "### Authoritative ingest" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo "$body" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Trigger legacy news ingest (for raw_items flow)
        env:
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          INGEST_URL: https://special-sits-production.up.railway.app/api/ingest/run
        run: |
          response=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "$INGEST_URL" \
            -H "x-ingest-token: $INGEST_TOKEN" \
            --max-time 300 || echo 'HTTP_STATUS:000')
          body=$(echo "$response" | sed -e 's/HTTP_STATUS:.*//g')
          status=$(echo "$response" | tr -d '\n' | sed -e 's/.*HTTP_STATUS://')
          echo "HTTP $status"
          echo "Response: $body"
          # Non-fatal — legacy pipeline is supplementary now
          if [ "$status" -ne 200 ]; then
            echo "::warning::Legacy news ingest returned HTTP $status (non-fatal)"
          fi
          echo "### Legacy news ingest (supplementary)" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo "$body" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
